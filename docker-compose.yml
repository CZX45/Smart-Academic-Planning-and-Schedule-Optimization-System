services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sapsos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapsos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sapsos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    env_file: .env.example
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file: .env.example
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
