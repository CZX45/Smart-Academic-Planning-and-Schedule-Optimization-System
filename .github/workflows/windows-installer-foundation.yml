name: Windows installer foundation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "desktop-shell/**"
      - "scripts/windows/Build-FastAPI-Runtime.ps1"
      - "scripts/windows/Build-Web-UI.ps1"
      - "scripts/windows/Build-Windows-Installer.ps1"
      - "scripts/windows/Validate-Desktop-Identity.ps1"
      - "scripts/windows/Validate-Windows-Installer-Artifact.ps1"
      - "scripts/windows/Validate-Windows-Installer-ResourceContract.ps1"
      - "scripts/windows/Invoke-Windows-Installer-Artifact-RoundTrip.ps1"
      - "scripts/windows/Validate-Packaging-Staging.ps1"
      - "scripts/windows/Validate-FastAPI-Runtime.ps1"
      - "scripts/windows/Invoke-SafeBuildCleanup.ps1"
      - "desktop-shell/desktop-identity.json"
      - "desktop-shell/data-retention-contract.json"
      - "apps/api/pyproject.toml"
      - "apps/api/tests/test_windows_installer_foundation.py"
      - "apps/api/tests/test_windows_installer_preflight.py"
      - "apps/api/tests/test_windows_installer_runtime_payload.py"
      - "package.json"

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-2022
    env:
      SAPSOS_SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      SAPSOS_WORKFLOW_SHA: ${{ github.sha }}
      SAPSOS_WORKFLOW_REF: ${{ github.ref }}
      SAPSOS_MERGE_REF_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "apps/api[dev]"
      - run: cargo install tauri-cli --version 2.11.4 --locked
      - run: python -m pytest apps/api/tests/test_windows_installer_preflight.py -q
      - run: python -m pytest apps/api/tests/test_windows_installer_runtime_payload.py -q
      - run: pnpm desktop:installer:windows
      - run: cargo test --manifest-path desktop-shell/src-tauri/Cargo.toml
      - run: pnpm desktop:installer:validate
      - uses: actions/upload-artifact@v4
        with:
          name: sapsos-windows-installer-foundation
          path: dist/windows-installer
          if-no-files-found: error
