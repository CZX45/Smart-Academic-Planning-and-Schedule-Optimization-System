name: Windows installer lifecycle

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-installer-lifecycle.yml"
      - "desktop-shell/**"
      - "scripts/windows/**"
      - "apps/api/app/api/local_data_removal.py"
      - "apps/api/app/services/local_data_removal.py"
      - "apps/api/app/run.py"
      - "apps/api/tests/test_local_data_removal.py"
      - "packages/shared/src/index.ts"
      - "apps/web/src/app/page.tsx"

permissions:
  contents: read

jobs:
  lifecycle:
    runs-on: windows-2025
    timeout-minutes: 90
    env:
      CI: "true"
      SAPSOS_LIFECYCLE_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - run: corepack pnpm install --frozen-lockfile
      - run: python -m pip install -e "apps/api[dev]"
      - run: cargo install tauri-cli --version 2.11.4 --locked
      - run: python -m pytest apps/api/tests/test_local_data_removal.py -q
      - run: corepack pnpm openapi:check
      - run: >-
          pwsh -NoProfile -File scripts/windows/Build-Windows-Installer.ps1
          -OutputRoot dist/windows-installer-previous
          -TestVersionOverride 0.1.0
          -AllowTestVersionOverride
      - run: >-
          pwsh -NoProfile -File scripts/windows/Build-Windows-Installer.ps1
          -OutputRoot dist/windows-installer-next
          -TestVersionOverride 0.1.1
          -AllowTestVersionOverride
      - name: Run bounded installer lifecycle
        timeout-minutes: 20
        run: >-
          pwsh -NoProfile -File scripts/windows/Invoke-Windows-Installer-Lifecycle.ps1
          -InstallerPath dist/windows-installer-previous/SAPSOS-Local-Desktop-0.1.0-x64-setup.exe
          -UpgradeInstallerPath dist/windows-installer-next/SAPSOS-Local-Desktop-0.1.1-x64-setup.exe
      - run: cargo test --manifest-path desktop-shell/src-tauri/Cargo.toml
      - run: cargo check --manifest-path desktop-shell/src-tauri/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sapsos-windows-installer-lifecycle
          path: dist/windows-installer-next
          if-no-files-found: error
          retention-days: 14
