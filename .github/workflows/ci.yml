name: CI
on:
  push:
  pull_request:
jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sapsos
          POSTGRES_PASSWORD: sapsos_dev_password
          POSTGRES_DB: sapsos
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U sapsos -d sapsos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "apps/api[dev]"
      - run: cd apps/api && python -m alembic upgrade head
      - run: pnpm seed
      - run: pnpm seed
      - run: cd apps/api && python -m alembic check
      - run: cd apps/api && python -m ruff check .
      - run: cd apps/api && python -m ruff format --check .
      - run: cd apps/api && python -m mypy .
      - run: cd apps/api && python -m pytest
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm openapi:check
      - run: git diff --check
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "apps/api[dev]"
      - run: pnpm exec playwright install --with-deps
      - run: pnpm e2e
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose up -d --build
      - run: timeout 60 bash -c 'until curl --fail --show-error http://localhost:8000/health; do sleep 2; done'
      - run: timeout 60 bash -c 'until curl --fail --show-error http://localhost:8000/ready; do sleep 2; done'
      - run: timeout 60 bash -c 'until curl --fail --show-error http://localhost:3000; do sleep 2; done'
      - run: docker compose exec -T api python -m app.seed_dev
      - run: docker compose exec -T api python -m app.seed_dev
      - run: |
          count="$(docker compose exec -T db psql -U sapsos -d sapsos -tAc "select count(*) from dev_seed_records where seed_key = 'mock-institution';" | tr -d '[:space:]')"
          test "$count" = "1"
      - if: always()
        run: docker compose ps
      - if: always()
        run: docker compose logs --no-color --tail=200
      - if: always()
        run: docker compose down -v
