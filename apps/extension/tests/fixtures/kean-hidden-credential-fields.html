<!doctype html>
<html>
  <head>
    <title>Unofficial Transcript</title>
  </head>
  <body>
    <main>
      <h1>Unofficial Transcript</h1>
      <table>
        <caption>
          Kean transcript with hidden fields
        </caption>
        <thead>
          <tr>
            <th>Term</th>
            <th>Course</th>
            <th>Title</th>
            <th>Credits</th>
            <th>Grade</th>
            <th>Status</th>
            <th>Hidden Action Value</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2024FA</td>
            <td>MATH 1054</td>
            <td>Mock Precalculus</td>
            <td>3</td>
            <td>A</td>
            <td>Completed</td>
            <td><input type="hidden" value="hidden-field-value" /></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
