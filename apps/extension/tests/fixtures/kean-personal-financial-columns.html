<!doctype html>
<html>
  <head>
    <title>Unofficial Transcript</title>
  </head>
  <body>
    <main>
      <h1>Unofficial Transcript</h1>
      <table>
        <caption>
          Kean transcript with unrelated columns
        </caption>
        <thead>
          <tr>
            <th>Term</th>
            <th>Course</th>
            <th>Title</th>
            <th>Credits</th>
            <th>Grade</th>
            <th>Status</th>
            <th>Student Email</th>
            <th>Account Balance</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2024FA</td>
            <td>ENG 1030</td>
            <td>Mock College Composition</td>
            <td>3</td>
            <td>B</td>
            <td>Completed</td>
            <td>mock.student@example.edu</td>
            <td>$500.00</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
